<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麦卡卡 - 待办事项管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            color: white;
            font-weight: bold;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .features {
            text-align: left;
            margin-bottom: 30px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .feature-item:last-child {
            border-bottom: none;
        }
        .feature-icon {
            width: 30px;
            height: 30px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px;
            font-size: 16px;
        }
        .feature-text {
            color: #444;
            font-size: 14px;
        }
        .download-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .footer {
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">麦</div>
        <h1>麦卡卡</h1>
        <p class="subtitle">一款简洁高效的待办事项管理应用</p>
        
        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">📋</div>
                <span class="feature-text">多种事项类型：待办、质保、日程提醒</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔔</div>
                <span class="feature-text">日历提醒，支持每天重复提醒</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📊</div>
                <span class="feature-text">统计分析，掌握任务完成情况</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🌙</div>
                <span class="feature-text">支持深色模式，保护眼睛</span>
            </div>
        </div>
        
        <a href="#" class="download-btn">下载安装包</a>
        
        <div class="footer">
            <p>适用于 HarmonyOS 系统</p>
            <p style="margin-top: 10px;">
                <a href="privacy.html">隐私政策</a> | 
                <a href="agreement.html">用户协议</a>
            </p>
        </div>
    </div>
</body>
</html>
